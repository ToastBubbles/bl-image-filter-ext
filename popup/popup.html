<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <h3>BrickLink Filter</h3>

    <div class="row">
      <label class="switch">
        <input type="checkbox" id="toggle" />
        <span class="slider"></span>
      </label>
      <span>Enabled</span>
    </div>

    <br />

    <div class="row">
      <label class="switch">
        <input type="checkbox" id="speedyMode" />
        <span class="slider"></span>
      </label>
      <span>Speedy Mode</span>
    </div>

    <div class="row">
      <label class="switch">
        <input type="checkbox" id="hideKnown" />
        <span class="slider"></span>
      </label>
      <span>Hide Known</span>
    </div>

    <p id="status">Loading...</p>

    <script src="popup.js"></script>
  </body>
</html>
